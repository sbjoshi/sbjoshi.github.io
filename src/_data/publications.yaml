- id: Bora-llvm-hpc-2021
  title: OpenMP aware MHP Analysis for Improved Static Data-Race Detection
  author: Utpal Bora, Shraiysh Vaishay, Saurabh Joshi, Ramakrishna Upadrasta
  year: '2021'
  venue: LLVM HPC 2021
  abstract: >-
    Data races, a major source of bugs in concurrent programs, can result in
    loss of manpower and time as well as data loss due to system failures.
    OpenMP, the de facto shared memory parallelism framework used in the HPC
    community, also suffers from data races. To detect race conditions in OpenMP
    programs and improve turnaround time and/or developer productivity, we
    present a data flow analysis based, fast, static data race checker in the
    LLVM compiler framework. Our tool can detect races in the presence or
    absence of explicit barriers, with implicit or explicit synchronization. In
    addition, our tool effectively works for the OpenMP target offloading
    constructs and also supports the frequently used OpenMP constructs.  We
    formalize and provide a data flow analysis framework to perform Phase
    Interval Analysis (PIA) of OpenMP programs.  Phase intervals are then used
    to compute the MHP (and its complement NHP) sets for the programs, which, in
    turn, are used to detect data races statically.  We evaluate our work using
    multiple OpenMP race detection benchmarks and real world applications. Our
    experiments show that the checker is comparable to the state-of-the-art in
    various performance metrics with around 90 percent accuracy, almost perfect
    recall, and significantly lower runtime and memory footprint.
  doi: ''
  links:
    github: https://github.com/utpalbora/LLOV
    pre-print: https://arxiv.org/pdf/2111.04259.pdf
  files: {}
  booktitle: Workshop on the LLVM Compiler Infrastructure in HPC
- id: spin2021-anomaly-detection
  title: Anomaly Detection in Data Plane Systems using Packet Execution Paths
  author: Archit Sanghi, Praveen Tammana, Saurabh Joshi, Krishna P Kadiyala
  year: '2021'
  venue: ACM SIGCOMM SPIN 2021
  abstract: >-
    Programmable data planes provide exciting opportunities to realize fast,
    accurate, and data-driven control-loop decisions. Many data plane systems
    have been proposed for handling network dynamics (congestion, failures) in
    near real-time. The core of these systems has packet-processing data-plane
    algorithms that continuously monitor traffic and respond automatically.
    Despite their benefits, automatic response to network events lead to an
    increase in potential sources of inputs, and hence, an increase in attack
    surface. This paper takes a step towards securing such systems by (1)
    identifying possible attacks on recently proposed data-driven data-plane
    systems; and (2) designing a scalable tool for detecting such attacks at run
    time. Our approach models plausible expected behavior and uses the model as
    a reference to check whether the system is under attack. We conduct
    preliminary experiments to demonstrate the feasibility of our detection
    methodology.
  doi: 10.1145/3472873.3472880
  links: {}
  files:
    pdf: /assets/publications/p4anomaly-spin-2021.pdf
  booktitle: ACM SIGCOMM workshop on Secure Programmable network INfrastructure
- id: BHYRAVARAPU2020
  title: On the tractability of $(k,i)$-coloring (Extended Journal Version)
  author: >-
    Sriram Bhyravarapu, Saurabh Joshi, Subrahmanyam Kalyanasundaram, Anjeneya
    Swami Kare
  year: '2020'
  venue: DAM
  abstract: >-
    In an undirected graph, a proper $(k,i)$-coloring is an assignment of a set
    of colors to each vertex such that any two adjacent vertices have at most
    common colors. The $(k,i)$-coloring problem is to compute the minimum number
    of colors required for a proper $(k,i)$-coloring. This is a generalization
    of the classical graph coloring problem.  We design a parameterized
    algorithm for the $(k,i)$-coloring problem with the size of the feedback
    vertex set as a parameter. Our algorithm does not use tree-width machinery,
    thus answering a question of Majumdar, Neogi, Raman and Tale [CALDAM 2017].
    We also give a faster exact algorithm for $(k,k-1)$-coloring. From the
    hardness perspective, we show that the $(k,i)$-coloring problem is
    NP-complete for any fixed values $i$, $k$, whenever $i < k$, thereby
    settling a conjecture of Méndez-Díaz and Zabala (1999) and again asked by
    Majumdar, Neogi, Raman and Tale. The NP-completeness result improves the
    partial NP-completeness shown in the preliminary version of this paper
    published in CALDAM 2018.
  doi: 10.1016/j.dam.2020.08.018
  links:
    paper: https://arxiv.org/pdf/1802.03634.pdf
  files: {}
  journal: Discrete Applied Mathematics
- id: bora-taco2020
  title: 'LLOV: A Fast Static Data-Race Checker for OpenMP Programs'
  author: >-
    Utpal Bora, Santanu Das, Pankaj Kukreja, Saurabh Joshi, Ramakrishna
    Upadrasta, Sanjay V Rajopadhye
  year: '2020'
  venue: ACM TACO
  abstract: >-
    In the era of Exascale computing, writing efficient parallel programs is
    indispensable and at the same time, writing sound parallel programs is very
    difficult. Specifying parallelism with frameworks such as OpenMP is
    relatively easy, but data races in these programs are an important source of
    bugs. In this paper, we propose LLOV, a fast, lightweight, language
    agnostic, and static data race checker for OpenMP programs based on the LLVM
    compiler framework. We compare LLOV with other state-of-the-art data race
    checkers on a variety of well-established benchmarks. We show that the
    precision, accuracy, and the F1 score of LLOV is comparable to other
    checkers while being orders of magnitude faster. To the best of our
    knowledge, LLOV is the only tool among the state-of-the-art data race
    checkers that can verify a C/C++ or FORTRAN program to be data race free.
  doi: 10.1145/3418597
  links:
    github: https://github.com/utpalbora/LLOV
    paper: https://dl.acm.org/doi/pdf/10.1145/3418597
    video: https://www.youtube.com/watch?v=kyD4ysn8ljE&t=1h3m00s
    pre-print: https://arxiv.org/pdf/1912.12189.pdf
  files: {}
  journal: ACM Transaction on Architecture and Code Optimization
- id: DBLP:journals/jsat/JoshiKRM19
  title: 'Open-WBO-Inc: Approximation Strategies for Incomplete Weighted MaxSAT'
  author: Saurabh Joshi, Prateek Kumar, Sukrut Rao, Ruben Martins
  year: '2019'
  venue: JSAT
  abstract: >-
    Incomplete MaxSAT solving aims to quickly find a solution that attempts to
    minimize the sum of the weights of unsatisfied soft clauses without
    providing any optimality guarantees. In this paper, we propose two
    approximation strategies for improving incomplete weighted MaxSAT solving.
    In one of the strategies, we cluster the weights and approximate them with a
    representative weight. In another strategy, we break up the problem of
    minimizing the sum of weights of unsatisfiable clauses into multiple
    minimization subproblems. We have implemented these strategies in a tool
    Open-WBO-Inc. Using the subproblem minimization strategy, Open-WBO-Inc
    placed first and second in the weighted incomplete tracks in the MaxSAT
    Evaluation 2018 whereas the strategy based on weight approximation was
    placed fourth. We compare these strategies with the best incomplete MaxSAT
    solvers on benchmarks taken from MaxSAT Evaluation 2017 and MaxSAT
    Evaluation 2018 and show that the strategies proposed are competitive with
    the best of the solvers.
  doi: 10.3233/SAT190118
  links:
    github: https://github.com/sbjoshi/Open-WBO-Inc
    paper: >-
      https://content.iospress.com/download/journal-on-satisfiability-boolean-modeling-and-computation/sat190118?id=journal-on-satisfiability-boolean-modeling-and-computation%2Fsat190118
  files: {}
  journal: Journal of Satisfiability, Boolean Modelling and Computation(11)
- id: DBLP:conf/ijcai/PoteJM19
  title: Phase Transition Behavior of Cardinality and XOR Constraints
  author: Yash Pote, Saurabh Joshi, Kuldeep Meel
  year: '2019'
  venue: IJCAI 2019
  abstract: >-
    The runtime performance of modern SAT solvers is deeply connected to the
    phase transition behavior of CNF formulas. While CNF solving has witnessed
    significant runtime improvement over the past two decades, the same does not
    hold for several other classes such as the conjunction of cardinality and
    XOR constraints, denoted as CARD-XOR formulas. The problem of determining
    the satisfiability of CARD-XOR formulas is a fundamental problem with a wide
    variety of applications ranging from discrete integration in the field of
    artificial intelligence to maximum likelihood decoding in coding theory. The
    runtime behavior of random CARD-XOR formulas is unexplored in prior work. In
    this paper, we present the first rigorous empirical study to characterize
    the runtime behavior of 1-CARD-XOR formulas. We show empirical evidence of a
    surprising phase-transition that follows a non-linear tradeoff between CARD
    and XOR constraints.
  doi: 10.24963/ijcai.2019/162
  links:
    paper: https://arxiv.org/pdf/1910.09755.pdf
  files: {}
  booktitle: International Joint Conference on Artificial Intelligence
