- id: llor-vmcai25
  title: 'LLOR: Automated Repair of OpenMP Programs'
  author: Utpal Bora, Saurabh Joshi, Gautam Muduganti, Ramakrishna Upadrasta
  year: '2025'
  venue: VMCAI 2025
  abstract: >-
    In this paper, we present a technique for repairing data race errors in
    parallel programs written in C/C++ and Fortran using the OpenMP API. Our
    technique can also remove barriers that are deemed unnecessary for
    correctness. We implement these ideas in our tool called LLOR, which takes a
    language-independent approach to provide appropriate placements of
    synchronization constructs to avoid data races. To the best of our
    knowledge, LLOR is the only tool that can repair parallel programs that use
    the OpenMP API. We showcase the capabilities of LLOR by performing extensive
    experiments on 415 parallel programs.
  doi: 10.1007/978-3-031-82703-7_6
  links:
    github: https://github.com/cs17resch01003/llor
    paper: https://doi.org/10.1007/978-3-031-82703-7_6
  files: {}
  booktitle: >-
    26th International Conference on Verification, Model Checking and Abstract
    Interpretation
- id: joshi-sadhana2024
  title: 'GPURepair: Automated Repair of GPU Kernels (Extended Version)'
  author: Saurabh Joshi, Gautam Muduganti
  year: '2024'
  venue: Sadhana, Vol. 49
  abstract: >-
    This paper presents a technique for repairing errors in GPU kernels written
    in CUDA or OpenCL due to data races and barrier divergence. Our novel
    extension to prior work can also remove barriers that are deemed unnecessary
    for correctness. We implement these ideas in our tool called GPURepair,
    which usesGPUVerify as the verification oracle for GPU kernels. We also
    extend GPUVerify to support CUDA Cooperative Groups, allowing GPURepair to
    suggest inter-block synchronization for repairing a CUDA kernel if deemed
    necessary. To the best of our knowledge, GPURepair is the only tool that can
    propose a fix for intrablockdata races and barrier divergence errors for
    both CUDA and OpenCL kernels. It is also the only tool that can propose
    fixes for inter-block data races in CUDA kernels. We perform extensive
    experiments on about 750 kernels and provide a comparison with prior work.
    We demonstrate the superiority of GPURepair through its capability to fix
    more kernels and its unique ability to remove redundant barriers and handle
    inter-block data races. We have also enhanced the initial version of
    GPURepair to support incremental solving during the repairprocess. This
    enhancement improves the performance of GPURepair by about 25% for the test
    suite that we have used.
  doi: 10.1007/s12046-023-02291-0
  links:
    github: https://github.com/cs17resch01003/gpurepair
    paper: https://www.ias.ac.in/describe/article/sadh/049/0010
    video: https://www.youtube.com/watch?v=WtOT31S-RA8&t=2h57m34s
  files: {}
  journal: Sadhana - A Journal of Indian Academy of Sciences, Vol. 49
- id: dora-icdcs23
  title: 'DORA: Distributed Agreement with Simple Majority'
  author: Prasanth Chakka, Saurabh Joshi, Aniket Kate, Joshua Tobkin, David Yang
  year: '2023'
  venue: ICDCS 2023
  abstract: >-
    Oracle networks feeding off-chain information to a blockchain are required
    to solve a distributed agreement problem since these networks receive
    information from multiple sources and at different times. We make a key
    observation that in most cases, the value obtained by oracle network nodes
    from multiple information sources are in close proximity. We deﬁne a notion
    of agreement distance and leverage the availability of a state machine
    replication (SMR) service to solve this distributed agreement problem with
    an honest simple majority of nodes instead of the conventional requirement
    of an honest super majority of nodes. Values from multiple nodes being in
    close proximity, therefore, forming a coherent cluster, is one of the keys
    to its efﬁciency. Our asynchronous protocol also embeds a fallback mechanism
    if the coherent cluster formation fails.  Through simulations using
    real-world exchange data from seven prominent exchanges, we show that even
    for very small agreement distance values, the protocol would be able to form
    coherent clusters and therefore, can safely tolerate up to 1/2 fraction of
    Byzantine nodes. We also show that, for a small statistical error, it is
    possible to choose the size of the oracle network to be signiﬁcantly smaller
    than the entire system tolerating up to a 1/3 fraction of Byzantine
    failures. This allows the oracle network to operate much more efﬁciently and
    horizontally scale much better.
  doi: 10.1109/ICDCS57875.2023.00025
  links:
    paper: https://arxiv.org/pdf/2305.03903.pdf
    video: https://www.youtube.com/watch?v=i9ySrtZD6sM
    icdcs 2023 version: https://ieeexplore.ieee.org/document/10272471
  files: {}
  booktitle: International Conference on Distributed Computing Systems 2023
- id: joshi-vmcai2021
  title: 'GPURepair: Automated Repair of GPU Kernels'
  author: Saurabh Joshi, Gautam Muduganti
  year: '2021'
  venue: VMCAI 2021
  abstract: >-
    This paper presents a tool for repairing errors in GPU kernels written in
    CUDA or OpenCL due to data races and barrier divergence. Our novel extension
    to prior work can also remove barriers that are deemed unnecessary for
    correctness. We implement these ideas in our tool called GPURepair, which
    uses GPUVerify as the verification oracle for GPU kernels. We also extend
    GPUVerify to support CUDA Cooperative Groups, allowing GPURepair to perform
    inter-block synchronization for CUDA kernels. To the best of our knowledge,
    GPURepair is the only tool that can propose a fix for intra-block data races
    and barrier divergence errors for both CUDA and OpenCL kernels and the only
    tool that fixes inter-block data races for CUDA kernels. We perform
    extensive experiments on about 750 kernels and provide a comparison with
    prior work. We demonstrate the superiority of GPURepair through its
    capability to fix more kernels and its unique ability to remove redundant
    barriers and handle inter-block data races.
