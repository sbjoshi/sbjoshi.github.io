- id: DBLP:journals/toplas/ForejtJKNS17
  title: >-
    Precise Predictive Analysis for Discovering Communication Deadlocks in MPI
    Programs
  author: >-
    Vojtech Forejt, Saurabh Joshi, Daniel Kroening, Ganesh Narayanaswamy, Subodh
    Sharma
  year: '2017'
  venue: TOPLAS
  abstract: >-
    The Message Passing Interface (MPI) is the standard API for parallelization
    in high-performance and scientific computing. Communication deadlocks are a
    frequent problem in MPI programs, and this article addresses the problem of
    discovering such deadlocks. We begin by showing that if an MPI program is
    single path, the problem of discovering communication deadlocks is
    NP-complete. We then present a novel propositional encoding scheme that
    captures the existence of communication deadlocks. The encoding is based on
    modeling executions with partial orders and implemented in a tool called
    MOPPER. The tool executes an MPI program, collects the trace, builds a
    formula from the trace using the propositional encoding scheme, and checks
    its satisfiability. Finally, we present experimental results that quantify
    the benefit of the approach in comparison to other analyzers and demonstrate
    that it offers a scalable solution for single-path programs.
  doi: 10.1016/j.dam.2020.08.018
  links: {}
  files:
    pdf: /assets/publications/toplas2017-mpi.pdf
  journal: ACM Transactions on Programming Languages and Systems(39)
- id: DBLP:conf/ppopp/Narayanaswamy0K16
  title: 'The virtues of conflict: analysing modern concurrency'
  author: Ganesh Narayanaswamy, Saurabh Joshi, Daniel Kroening
  year: '2016'
  venue: PPoPP 2016
  abstract: >-
    Modern shared memory multiprocessors permit reordering of memory operations
    for performance reasons. These reorderings are often a source of subtle bugs
    in programs written for such architectures. Traditional approaches to verify
    weak memory programs often rely on interleaving semantics, which is prone to
    state space explosion, and thus severely limits the scalability of the
    analysis. In recent times, there has been a renewed interest in modelling
    dynamic executions of weak memory programs using partial orders. However,
    such an approach typically requires ad-hoc mechanisms to correctly capture
    the data and control-flow choices/conflicts present in real-world programs.
    In this work, we propose a novel, conflict-aware, composable, truly
    concurrent semantics for programs written using C/C++ for modern weak memory
    architectures. We exploit our symbolic semantics based on general event
    structures to build an efficient decision procedure that detects assertion
    violations in bounded multi-threaded programs. Using a large, representative
    set of benchmarks, we show that our conflict-aware semantics outperforms the
    state-of-the-art partial-order based approaches.
  doi: 10.1145/2851141.2851165
  links:
    paper: https://arxiv.org/pdf/1602.08321.pdf
  files: {}
  booktitle: ACM SIGPLAN Symposium on Principles and Practice of Parallel Programming
- id: DBLP:conf/fm/Mukherjee0GKM16
  title: Equivalence Checking of a Floating-Point Unit Against a High-Level C Model
  author: >-
    Rajdeep Mukherjee, Saurabh Joshi, Andreas Griesmayer, Daniel Kroening, Tom
    Melham
  year: '2016'
  venue: FM 2016
  abstract: >-
    Semiconductor companies have increasingly adopted a methodology that starts
    with a system-level design specification in C/C++/SystemC. This model is
    extensively simulated to ensure correct functionality and performance.
    Later, a Register Transfer Level (RTL) implementation is created in Verilog,
    either manually by a designer or automatically by a high-level synthesis
    tool. It is essential to check that the C and Verilog programs are
    consistent. In this paper, we present a two-step approach, embodied in two
    equivalence checking tools, VERIFOX and HW-CBMC, to validate designs at the
    software and RTL levels, respectively. VERIFOX is used for equivalence
    checking of an untimed software model in C against a high-level reference
    model in C. HW-CBMC verifies the equivalence of a Verilog RTL implementation
    against an untimed software model in C. To evaluate our tools, we applied
    them to a commercial floating-point arithmetic unit (FPU) from ARM and an
    open-source dual-path floating-point adder.
  doi: 10.1007/978-3-319-48989-6_33
  links:
    paper: https://arxiv.org/pdf/1609.00169.pdf
  files: {}
  booktitle: International Symposium on Formal Methods
- id: DBLP:conf/cp/0001MM15
  title: Generalized Totalizer Encoding for Pseudo-Boolean Constraints
  author: Saurabh Joshi, Ruben Martins, Vasco Manquinho
  year: '2015'
  venue: CP 2015
  abstract: >-
    Pseudo-Boolean constraints, also known as 0-1 Integer Linear Constraints,
    are used to model many real-world problems. A common approach to solve these
    constraints is to encode them into a SAT formula. The runtime of the SAT
    solver on such formula is sensitive to the manner in which the given
    pseudo-Boolean constraints are encoded. In this paper, we propose
    generalized Totalizer encoding (GTE), which is an arc-consistency preserving
    extension of the Totalizer encoding to pseudo-Boolean constraints. Unlike
    some other encodings, the number of auxiliary variables required for GTE
    does not depend on the magnitudes of the coefficients. Instead, it depends
    on the number of distinct combinations of these coefficients. We show the
    superiority of GTE with respect to other encodings when large pseudo-Boolean
    constraints have low number of distinct coefficients. Our experimental
    results also show that GTE remains competitive even when the pseudo-Boolean
    constraints do not have this characteristic.
  doi: 10.1007/978-3-319-23219-5_15
  links:
    github: https://github.com/sat-group/open-wbo
    paper: https://arxiv.org/pdf/1507.05920.pdf
  files: {}
  booktitle: >-
    International Conference on Principles and Practice of Constraint
    Programming
- id: DBLP:journals/jsat/Martins0ML14
  title: On Using Incremental Encodings in Unsatisfiability-based MaxSAT Solving
  author: Ruben Martins, Saurabh Joshi, Vasco Manquinho, Ines Lynce
  year: '2015'
  venue: JSAT
  abstract: >-
    In recent years, unsatisfiability-based algorithms have become prevalent as
    state of the art for solving industrial instances of Maximum Satisfiability
    (MaxSAT). These algorithms perform a succession of unsatisfiable SAT solver
    calls until an optimal solution is found. In several of these algorithms,
    cardinality or pseudo-Boolean constraints are extended between iterations.
    However, in most cases, the formula provided to the SAT solver in each
    iteration must be rebuilt and no knowledge is reused from one iteration to
    the next.  This paper describes how to implement incremental
    unsatisfiability-based algorithms for MaxSAT. In particular, we detail and
    analyze our implementation of the MSU3 algorithm in the open-wbo framework
    that performed remarkably well in the MaxSAT Evaluation of 2014.
    Furthermore, we also propose to extend incrementality to weighted MaxSAT
    through an incremental encoding of pseudo-Boolean constraints. The
    experimental results show that the performance of MaxSAT algorithms can be
    greatly improved by exploiting the learned information and maintaining the
    internal state of the SAT solver between iterations. Finally, the proposed
    incremental encodings of cardinality and pseudo-Boolean constraints are not
    exclusive for MaxSAT usage and can be used in other domains.
