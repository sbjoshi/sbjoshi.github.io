- id: DBLP:conf/sas/Brain0KS15
  title: Safety Verification and Refutation by $k$-Invariants and $k$-Induction
  author: Martin Brain, Saurabh Joshi, Daniel Kroening, Peter Schrammel
  year: '2015'
  venue: SAS 2015
  abstract: >-
    Most software verification tools can be classified into one of a number of
    established families, each of which has their own focus and strengths. For
    example, concrete counterexample generation in model checking, invariant
    inference in abstract interpretation and completeness via annotation for
    deductive verification. This creates a significant and fundamental usability
    problem as users may have to learn and use one technique to find potential
    problems but then need an entirely different one to show that they have been
    fixed. This paper presents a single, unified algorithm kIkI, which strictly
    generalises abstract interpretation, bounded model checking and k-induction.
    This not only combines the strengths of these techniques but allows them to
    interact and reinforce each other, giving a `single-tool' approach to
    verification.
  doi: 10.1007/978-3-662-48288-9_9
  links:
    github: https://github.com/diffblue/2ls
    paper: https://arxiv.org/pdf/1506.05671.pdf
  files: {}
  booktitle: Static Analysis Symposium
- id: DBLP:conf/fm/0001K15
  title: Property-Driven Fence Insertion Using Reorder Bounded Model Checking
  author: Saurabh Joshi, Daniel Kroening
  year: '2015'
  venue: FM 2015
  abstract: >-
    Modern architectures provide weaker memory consistency guarantees than
    sequential consistency. These weaker guarantees allow programs to exhibit
    behaviours where the program statements appear to have executed out of
    program order. Fortunately, modern architectures provide memory barriers
    (fences) to enforce the program order between a pair of statements if
    needed. Due to the intricate semantics of weak memory models, the placement
    of fences is challenging even for experienced programmers. Too few fences
    lead to bugs whereas overuse of fences results in performance degradation.
    This motivates automated placement of fences. Tools that restore sequential
    consistency in the program may insert more fences than necessary for the
    program to be correct. Therefore, we propose a property-driven technique
    that introduces "reorder-bounded exploration" to identify the smallest
    number of program locations for fence placement. We implemented our
    technique on top of CBMC; however, in principle, our technique is generic
    enough to be used with any model checker. Our experimental results show that
    our technique is faster and solves more instances of relevant benchmarks as
    compared to earlier approaches.
  doi: 10.1007/978-3-319-19249-9_19
  links:
    github: http://www.cprover.org/glue
    paper: https://arxiv.org/pdf/1407.7443.pdf
  files: {}
  booktitle: International Symposium on Formal Methods
- id: DBLP:journals/corr/0001L14
  title: Automatically finding atomic regions for fixing bugs in Concurrent Programs
  author: Saurabh Joshi, Akash Lal
  year: '2014'
  venue: arXiv
  abstract: >-
    This paper presents a technique for automatically constructing a fix for
    buggy concurrent programs: given a concurrent program that does not satisfy
    user-provided assertions, we infer atomic blocks that fix the program. An
    atomic block protects a piece of code and ensures that it runs without
    interruption from other threads. Our technique uses a verification tool as a
    subroutine to find the smallest atomic regions that remove all bugs in a
    given program. Keeping the atomic regions small allows for maximum
    concurrency. We have implemented our approach in a tool called AtomicInf. A
    user of AtomicInf can choose between strong and weak atomicity semantics for
    the inferred fix. While the former is simpler to find, the latter provides
    more information about the bugs that got fixed.  We ran AtomicInf on several
    benchmarks and came up with the smallest and the most precise atomic regions
    in all of them. We implemented an earlier technique to our setting and
    observed that AtomicInf is 1.7 times faster on an average as compared to an
    earlier approach.
  doi: ''
  links:
    paper: https://arxiv.org/pdf/1403.1749.pdf
  files: {}
  booktitle: Computational Research Repository
- id: DBLP:conf/cp/MartinsJML14
  title: Incremental Cardinality Constraints for MaxSAT
  author: Ruben Martins, Saurabh Joshi, Vasco Manquinho, Ines Lynce
  year: '2014'
  venue: CP 2014
  abstract: >-
    Maximum Satisfiability (MaxSAT) is an optimization variant of the Boolean
    Satisfiability (SAT) problem. In general, MaxSAT algorithms perform a
    succession of SAT solver calls to reach an optimum solution making extensive
    use of cardinality constraints. Many of these algorithms are non-incremental
    in nature, i.e. at each iteration the formula is rebuilt and no knowledge is
    reused from one iteration to another. In this paper, we exploit the
    knowledge acquired across iterations using novel schemes to use cardinality
    constraints in an incremental fashion. We integrate these schemes with
    several MaxSAT algorithms. Our experimental results show a significant
    performance boost for these algo- rithms as compared to their
    non-incremental counterparts. These results suggest that incremental
    cardinality constraints could be beneficial for other constraint solving
    domains.
  doi: 10.1007/978-3-319-10428-7_39
  links:
    github: https://github.com/sat-group/open-wbo
    paper: https://arxiv.org/pdf/1408.4628.pdf
  files: {}
  booktitle: >-
    International Conference on Principles and Practice of Constraint
    Programming
- id: DBLP:conf/ipps/JoshiSA12
  title: A New Method of {MHP} Analysis for Languages with Dynamic Barriers
  author: Saurabh Joshi, R K Shyamasundar, Sanjeev K Aggarwal
  year: '2012'
  venue: HIPS IPDPSW 2012
  abstract: >-
    May-happen-in-parallel analysis is a very important analysis which enables
    several optimizations in parallel programs. Most of the work on MHP analysis
    has used forward flow analysis to compute \"parallel(n)\" -- set of nodes
    which may execute in parallel to a given node \"n\" -- including those
    approaches that addressed the issue for dynamic barrier languages. We
    propose a new approach to MHP analysis called "Phase Interval Analysis"
    (PIA) which computes phase intervals, corresponding to dynamic barriers, in
    which a statement may execute. PIA enables us to infer an order between two
    statements whenever it can establish that they can not execute in parallel.
    Because the ordering relation is transitive, we may also be able to infer
    indirect synchronization happening between two statements, even when they do
    not share a barrier. To the best of our knowledge, the issue of indirect
    synchronization has not been addressed prior to this work. We also compute
    condition functions under which different instances of the same statement
    may not execute in parallel, when the statements are nested within loops.
  doi: 10.1109/IPDPSW.2012.70
  links: {}
  files:
    pdf: /assets/publications/hips2012.pdf
  booktitle: International Parallel and Distributed Processing Symposium Workshops
- id: DBLP:conf/popl/JoshiLL12
  title: Underspecified harnesses and interleaved bugs
  author: Saurabh Joshi, Shuvendu Lahiri, Akash Lal
  year: '2012'
  venue: POPL 2012
  abstract: >-
    Static assertion checking of open programs requires setting up a precise
    harness to capture the environment assumptions. For instance, a library may
    require a file handle to be properly initialized before it is passed into
    it. A harness is used to set up or specify the appropriate preconditions
    before invoking methods from the program. In the absence of a precise
    harness, even the most precise automated static checkers are bound to report
    numerous false alarms. This often limits the adoption of static assertion
    checking in the hands of a user.  In this work, we explore the possibility
    of automatically filtering away (or prioritizing) warnings that result from
    imprecision in the harness. We limit our attention to the scenario when one
    is interested in finding bugs due to concurrency. We define a warning to be
    an interleaved bug when it manifests on an input for which no sequential
    interleaving produces a warning. As we argue in the paper, limiting a static
    analysis to only consider interleaved bugs greatly reduces false positives
    during static concurrency analysis in the presence of an imprecise harness. 
    We formalize interleaved bugs as a differential analysis between the
    original program and its sequential version and provide various techniques
    for finding them. Our implementation CBugs demonstrates that the scheme of
    finding interleaved bugs can alleviate the need to construct precise
    harnesses while checking real-life concurrent programs.
  doi: 10.1145/2103656.2103662
  links: {}
  files:
    pdf: /assets/publications/popl148-joshi.pdf
  booktitle: ACM SIGPLAN-SIGACT Symposium on Principles Programming Languages
